
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albion Split Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h1>🏰 Albion Split Manager</h1>

  <div class="grid">
    <section class="card">
      <h2>Configuración</h2>
      <input id="fecha" type="date">
      <input id="nombre" placeholder="Nombre del split">

      <input id="loot" type="number" placeholder="Loot tabla">
      <input id="bags" type="number" placeholder="Bolsas">
      <input id="repair" type="number" placeholder="Reparación">
      <input id="map" type="number" placeholder="Coste mapa">

      <input id="sale" type="number" value="90" placeholder="% venta">
      <input id="callerBonus" type="number" value="5" placeholder="Bonus caller">
      <input id="looterBonus" type="number" value="15" placeholder="Bonus looter">
    </section>

    <section class="card">
      <h2>Dashboard</h2>
      <div id="dashboard"></div>
      <button onclick="copyDiscord()">📋 Copiar Discord</button>
      <button onclick="saveSplit()">💾 Guardar Split</button>
      <button onclick="window.print()">📄 Exportar PDF</button>
    </section>
  </div>

  <section class="card">
    <h2>Jugadores</h2>
    <div id="players"></div>
    <button onclick="addPlayer()">➕ Añadir Jugador</button>
  </section>

  <section class="card">
    <h2>Pagos</h2>
    <table>
      <thead><tr><th>Nombre</th><th>Rol</th><th>Pago</th></tr></thead>
      <tbody id="payments"></tbody>
    </table>
  </section>

  <section class="card">
    <h2>Historial</h2>
    <div id="history"></div>
  </section>
</div>
<script src="script.js"></script>
</body>
</html>
